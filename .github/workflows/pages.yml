name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Inject DeepSeek key into build (preview repo only · key 公开是 demo 妥协)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # secret 不存在时 KEY 为空，build-key.js 维持占位，前端 fallback 到 localStorage
          printf "/* AUTO-GENERATED BY CI · 此文件在 GitHub Pages 上公开 · 仅 preview repo 启用 */\nwindow.BUILT_IN_KEY = %s;\n" "'${DEEPSEEK_API_KEY}'" > lib/assistant/build-key.js
          echo "build-key.js head:"
          head -3 lib/assistant/build-key.js | sed -E 's/(sk-.{4}).+/\1...REDACTED.../'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
